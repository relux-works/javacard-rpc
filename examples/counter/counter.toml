[applet]
name = "Counter"
description = "Counter example with richer auth-like metadata and signing methods"
version = "1.0.0"
aid = "F000000101"
cla = 0xB0

[methods.increment]
ins = 0x01
description = "Increment counter by amount"
[methods.increment.request]
fields = [{ name = "amount", type = "u8" }]
[methods.increment.response]
fields = [{ name = "value", type = "u16" }]

[methods.decrement]
ins = 0x02
description = "Decrement counter by amount"
[methods.decrement.request]
fields = [{ name = "amount", type = "u8" }]
[methods.decrement.response]
fields = [{ name = "value", type = "u16" }]

[methods.get]
ins = 0x03
description = "Get current counter value"
[methods.get.response]
fields = [{ name = "value", type = "u16" }]

[methods.reset]
ins = 0x04
description = "Reset counter to zero"

[methods.setLimit]
ins = 0x05
description = "Set upper limit for counter"
[methods.setLimit.request]
fields = [{ name = "limit", type = "u16" }]

[methods.getInfo]
ins = 0x06
description = "Get counter state snapshot with flags"
[methods.getInfo.response]
fields = [
    { name = "value", type = "u16" },
    { name = "limit", type = "u16" },
    { name = "version", type = "u8" },
    { name = "hasStoredData", type = "bool" },
    { name = "isAtLimit", type = "bool" }
]

[methods.store]
ins = 0x07
description = "Store arbitrary data blob (up to 128 bytes)"
[methods.store.request]
fields = [{ name = "data", type = "bytes" }]

[methods.load]
ins = 0x08
description = "Load previously stored data blob"
[methods.load.response]
fields = [{ name = "data", type = "bytes" }]

[methods.getSpki]
ins = 0x09
description = "Return mock DER SPKI bytes similar to auth-style applets"
[methods.getSpki.response]
fields = [{ name = "spki", type = "bytes[91]" }]

[methods.getImsi]
ins = 0x0A
description = "Return mock IMSI bytes as ASCII digits"
[methods.getImsi.response]
fields = [{ name = "imsi", type = "ascii" }]

[methods.getAppletInfo]
ins = 0x0B
description = "Return mock typed applet metadata"
[methods.getAppletInfo.response]
fields = [
    { name = "schemaVersion", type = "u8" },
    { name = "appletAid", type = "bytes[5]" },
    { name = "versionMajor", type = "u8" },
    { name = "versionMinor", type = "u8" },
    { name = "versionPatch", type = "u8" },
    { name = "keyAlgorithm", type = "u8" },
    { name = "capabilities", type = "u16" }
]

[methods.signChallenge]
ins = 0x0C
description = "Return deterministic mock DER signature bytes for the provided challenge"
[methods.signChallenge.request]
fields = [{ name = "challenge", type = "bytes" }]
[methods.signChallenge.response]
fields = [{ name = "signature", type = "bytes" }]

[methods.getDisplayName]
ins = 0x0D
description = "Return a UTF-8 display name assembled by the applet"
[methods.getDisplayName.response]
fields = [{ name = "displayName", type = "string" }]

[methods.echoMessage]
ins = 0x0E
description = "Roundtrip an arbitrary UTF-8 string through the applet"
[methods.echoMessage.request]
fields = [{ name = "message", type = "string" }]
[methods.echoMessage.response]
fields = [{ name = "message", type = "string" }]

[status_words]
SW_UNDERFLOW = { code = 0x6985, description = "Counter would go below zero" }
SW_OVERFLOW = { code = 0x6986, description = "Counter would exceed limit" }
SW_NO_DATA = { code = 0x6A88, description = "No data stored" }
SW_DATA_TOO_LONG = { code = 0x6A80, description = "Data exceeds max size" }
SW_EMPTY_CHALLENGE = { code = 0x6700, description = "Challenge must not be empty" }
