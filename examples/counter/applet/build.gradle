plugins {
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.1.10'
}

group = 'io.jcrpc.counter'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['-Xlint:-options']
}

tasks.named('compileKotlin') {
    enabled = false
}

tasks.named('compileTestJava') {
    sourceCompatibility = JavaVersion.VERSION_12
    targetCompatibility = JavaVersion.VERSION_12
}

kotlin {
    jvmToolchain(12)
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'counter:counter-server-javacard'

    // jCardSim provides javacard.framework classes (for CounterJCApplet adapter)
    implementation 'com.klinec:jcardsim:3.0.5.9'
    implementation files('libs/smartcardio.jar')

    testImplementation 'org.jetbrains.kotlin:kotlin-test-junit5'
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    jvmArgs '--add-modules', 'java.smartcardio'
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
    }
}
